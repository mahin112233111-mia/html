<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form action="#" method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <p>
                <label for="fullname">Full Name:</label><br>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" value="md. mahin" required>
            </p>

            <p>
                <label for="studentid">Student ID:</label><br>
                <input type="text" id="studentid" name="studentid" placeholder="Enter your student ID" value="21-45741-3" required>
            </p>

            <p>
                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" placeholder="example@email.com" value="mmd9408256@gmail.com" required>
            </p>

            <p>
                <label for="phone">Phone Number:</label><br>
                <input type="tel" id="phone" name="phone" placeholder="01XXXXXXXXX" value="01768513451" required>
            </p>

            <p>
                <label for="dob">Date of Birth:</label><br>
                <input type="date" id="dob" name="dob" value="2001-01-01" required>
            </p>

            <p>
                Gender:<br>
                <input type="radio" id="male" name="gender" value="Male" checked required>
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>Academic Information</legend>

            <p>
                <label for="department">Department:</label><br>
                <select id="department" name="department" required>
                    <option value="CSE" selected>CSE</option>
                    <option value="EEE">EEE</option>
                    <option value="BBA">BBA</option>
                    <option value="English">English</option>
                    <option value="Civil Engineering">Civil Engineering</option>
                </select>
            </p>

            <p>
                <label for="semester">Semester:</label><br>
                <select id="semester" name="semester" required>
                    <option value="1st">1st Semester</option>
                    <option value="2nd">2nd Semester</option>
                    <option value="3rd">3rd Semester</option>
                    <option value="4th">4th Semester</option>
                    <option value="5th">5th Semester</option>
                    <option value="6th">6th Semester</option>
                    <option value="7th">7th Semester</option>
                    <option value="8th" selected>8th Semester</option>
                </select>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>Skills</legend>

            <p>Select Programming Languages Known:</p>
            <input type="checkbox" id="c" name="languages" value="C">
            <label for="c">C</label><br>

            <input type="checkbox" id="cpp" name="languages" value="C++">
            <label for="cpp">C++</label><br>

            <input type="checkbox" id="java" name="languages" value="Java">
            <label for="java">Java</label><br>

            <input type="checkbox" id="python" name="languages" value="Python" checked>
            <label for="python">Python</label><br>

            <input type="checkbox" id="javascript" name="languages" value="JavaScript">
            <label for="javascript">JavaScript</label>
        </fieldset>

        <br>

        <fieldset>
            <legend>Additional Information</legend>

            <p>
                <label for="address">Address:</label><br>
                <textarea id="address" name="address" rows="4" cols="40" placeholder="Enter your present address">Shibpur,Narsingdi</textarea>
            </p>

            <p>
                <label for="photo">Upload Student Photo:</label><br>
                <input type="file" id="photo" name="photo" accept="image/*">
            </p>

            <p>
                <label for="comments">Comments/Suggestions:</label><br>
                <textarea id="comments" name="comments" rows="4" cols="40" maxlength="200" placeholder="Maximum 200 characters">aiub</textarea>
            </p>
        </fieldset>

        <br>

        <p>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </p>

    </form>

</body>
</html>
